<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MUST Digital Assistant</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url("{{ url_for('static', filename='background.jpg') }}") no-repeat center center;
      background-size: cover;
      filter: grayscale(100%) blur(4px);
      z-index: -1;
    }
    body {
      font-family: 'Poppins', sans-serif;
      text-align: center;
      background: #1e1e1e;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .main-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 90%;
      max-width: 1200px;
    }
    .chat-container {
      width: 60%;
      max-width: 600px;
      background: #d3d3d3;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0px 10px 30px rgba(255, 255, 255, 0.2);
      overflow: hidden;
    }
    .chat-title {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 15px;
    }
    .must-logo {
      height: 80px;
      width: 400px;
      object-fit: contain;
    }
    .chat-box {
      height: 400px;
      overflow-y: auto;
      border: 2px solid #888;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 10px;
    }
    .chat-box p {
      padding: 12px;
      border-radius: 10px;
      max-width: 75%;
      display: inline-block;
      word-wrap: break-word;
      margin: 5px 0;
      font-size: 15px;
    }
    .user-message {
      background: #444;
      color: white;
      text-align: right;
      float: right;
      clear: both;
    }
    .bot-message {
      background: #e0e0e0;
      color: black;
      text-align: left;
      float: left;
      clear: both;
    }
    .input-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    .chat-input {
      flex: 1;
      padding: 12px;
      border-radius: 25px;
      border: 2px solid #666;
      background: #f9f9f9;
    }
    .send-btn, .mic-btn {
      padding: 12px;
      border: none;
      background: #444;
      color: white;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      transition: 0.3s;
      width: 45px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .send-btn:hover, .mic-btn:hover {
      background: #ff4e50;
    }
    .language-dropdown {
      width: 150px;
      padding: 8px;
      font-size: 14px;
      border-radius: 5px;
      background: #444;
      color: white;
      border: none;
    }
    .robot-container {
      width: 40%;
      max-width: 600px;
      animation: float 3s infinite ease-in-out;
    }
    .robot-container img {
      width: 100%;
      height: auto;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="robot-container">
      <img src="{{ url_for('static', filename='image.png') }}" alt="Moving Robot">
    </div>
    <div class="chat-container">
      <div class="chat-title">
        <img src="{{ url_for('static', filename='logo-dark.png') }}" alt="MUST Logo" class="must-logo">
      </div>
      <div class="chat-box" id="chat-box"></div>
      <div class="input-row">
        <input type="text" id="user-input" class="chat-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()" class="send-btn">➤</button>
        <button onclick="startVoice()" class="mic-btn">🎙️</button>
        <select class="language-dropdown" id="language-selector">
          <option value="en">English</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="zh">中文 (Chinese)</option>
          <option value="hi">हिन्दी (Hindi)</option>
          <option value="ar">العربية (Arabic)</option>
          <option value="ru">Русский (Russian)</option>
          <option value="ja">日本語 (Japanese)</option>
          <option value="pt">Português (Portuguese)</option>
          <option value="ur">اردو (Urdu)</option>
        </select>
      </div>
    </div>
    <div class="robot-container">
      <img src="{{ url_for('static', filename='image.png') }}" alt="Moving Robot">
    </div>
  </div>
  <script>
    function normalizeText(text) {
      return text.toLowerCase().replace(/[^\w\s]/g, '').trim();
    }
    let recognition;
    let selectedLanguage = 'en';
    document.getElementById("language-selector").addEventListener("change", function() {
      selectedLanguage = this.value;
    });

    function sendMessage() {
      let userInput = document.getElementById("user-input").value.trim();
      if (userInput === "") return;
      let normalizedInput = normalizeText(userInput);
      let chatBox = document.getElementById("chat-box");
      chatBox.innerHTML += `<p class="user-message"><b>You:</b> ${userInput}</p>`;
      chatBox.scrollTop = chatBox.scrollHeight;
      fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: normalizedInput, language: selectedLanguage })
        })
        .then(response => response.json())
        .then(data => {
          chatBox.innerHTML += `<p class="bot-message"><b>Bot:</b> ${data.response}</p>`;
          
          if (data.images) {
            let imageHTML = data.images.map(img => `<div><img src="${img.image}" alt="${img.name}" style="width:100px;margin:5px;border-radius:10px;"><div style='font-size:12px;'>${img.name}</div></div>`).join('');
            chatBox.innerHTML += `<div class="bot-message">${imageHTML}</div>`;
          }

          if (data.faculty) {
            let facultyHTML = data.faculty.map(member => `
              <div style="display:inline-block;margin:10px;text-align:center;">
                <img src="${member.image}" alt="${member.name}" style="width:100px;height:100px;border-radius:50%;object-fit:cover;"><br>
                <div style="font-size:14px;font-weight:bold;">${member.name}</div>
                <div style="font-size:12px;color:#555;">${member.title}</div>
                <div style="font-size:12px;color:#888;">${member.email}</div>
              </div>
            `).join('');
            chatBox.innerHTML += `<div class="bot-message">${facultyHTML}</div>`;
          }

          chatBox.scrollTop = chatBox.scrollHeight;
          speak(data.response);
        });
      document.getElementById("user-input").value = "";
    }

    function startVoice() {
      recognition = new(window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = selectedLanguage;
      recognition.interimResults = false;
      recognition.continuous = false;
      recognition.start();
      recognition.onresult = function(event) {
        let voiceText = event.results[0][0].transcript;
        document.getElementById("user-input").value = voiceText;
        sendMessage();
      };
      recognition.onerror = function(event) {
        console.error("Speech recognition error:", event.error);
      };
      recognition.onend = function() {
        console.log("Speech recognition ended.");
      };
    }

    function speak(text) {
      let speech = new SpeechSynthesisUtterance(text);
      speech.lang = selectedLanguage;
      window.speechSynthesis.speak(speech);
    }

    window.onload = function() {
      let welcomeMessage = "Hello! Welcome to MUST Digital Assistant.";
      document.getElementById("chat-box").innerHTML += `<p class="bot-message"><b>Bot:</b> ${welcomeMessage}</p>`;
      speak(welcomeMessage);
    };

    function handleKeyPress(event) {
      if (event.key === "Enter") sendMessage();
    }
  </script>
</body>
</html>
